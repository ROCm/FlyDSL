jobs:
 -
  kernel_include_regex: (gqa_d128_kernel<opus_gqa_traits<32, 64, 128, 8, true> >)
  kernel_exclude_regex:
  kernel_iteration_range: "[1]"
  output_file: out
  output_directory: thread_trace/rpf_v3_opus_gqa_d128_b2_s1024_wpe2
  output_format: [csv]
  truncate_kernels: false
  sys_trace: false
  advanced_thread_trace: true
  att_target_cu: 1
  att_shader_engine_mask: "0xf"
  att_simd_select: "0xf"
  att_buffer_size: "0x10000000"
