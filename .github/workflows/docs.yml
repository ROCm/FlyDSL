name: Documentation

on:
  push:
    branches:
      - main
      - ci_dashboard
  pull_request:
    branches:
      - main

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Install FlyDSL (best effort)
        run: |
          pip install -e . 2>/dev/null || true

      - name: Build Sphinx documentation
        run: |
          cd docs
          make html

      - name: Bundle CI performance dashboard
        run: |
          rm -rf docs/_build/html/ci-dashboard
          mkdir -p docs/_build/html/ci-dashboard
          cp -r .github/dashboard/. docs/_build/html/ci-dashboard/

      - name: Deploy to gh-pages branch
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci_dashboard')
        run: |
          cd docs/_build/html
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          # Preserve existing data files from gh-pages (updated by ingest workflow)
          if git fetch --depth=1 origin gh-pages 2>/dev/null; then
            git checkout gh-pages -- ci-dashboard/data/history.json ci-dashboard/data/runs.json 2>/dev/null || true
          fi
          git add -A
          git commit -qm "docs: deploy $(date -u +%FT%TZ) [skip ci]"
          git push -f origin HEAD:gh-pages
