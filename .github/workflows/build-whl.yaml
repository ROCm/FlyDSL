name: Build Wheels

on:
  workflow_call:
    inputs:
      release_type:
        description: 'Release type determines target S3 bucket (devreleases, nightlies, release)'
        type: string
        required: true
      upload_s3_staging:
        description: 'Upload built wheels to the S3 staging bucket'
        type: boolean
        required: false
        default: true
      package_version_override:
        description: 'Optional exact Python package version to build'
        type: string
        required: false
        default: ''
    outputs:
      wheel_names:
        description: 'Space-separated list of built wheel filenames'
        value: ${{ jobs.build.outputs.wheel_names }}

jobs:
  build:
    runs-on: linux-flydsl-mi325-1
    outputs:
      wheel_names: ${{ steps.collect-wheels.outputs.wheel_names }}
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: flydsl
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build or pull manylinux Docker image
        run: |
          ROCM_VERSION=7.2
          # Use Dockerfile content hash as tag — rebuild only when Dockerfile changes.
          DOCKERFILE="flydsl/docker/Dockerfile.manylinux_2_28"
          DF_HASH=$(sha256sum "${DOCKERFILE}" | cut -c1-12)
          REGISTRY_IMAGE="ghcr.io/${{ github.repository_owner }}/flydsl-manylinux_2_28"
          # Lowercase the image name (GHCR requires lowercase)
          REGISTRY_IMAGE=$(echo "${REGISTRY_IMAGE}" | tr '[:upper:]' '[:lower:]')
          TAG="rocm${ROCM_VERSION}-${DF_HASH}"
          FULL_IMAGE="${REGISTRY_IMAGE}:${TAG}"

          if docker pull "${FULL_IMAGE}" 2>/dev/null; then
            echo "Pulled cached image: ${FULL_IMAGE}"
          else
            echo "Cache miss — building image..."
            docker build \
              -f "${DOCKERFILE}" \
              --build-arg ROCM_VERSION="${ROCM_VERSION}" \
              -t "${FULL_IMAGE}" \
              flydsl/docker
            docker push "${FULL_IMAGE}" && echo "Pushed to GHCR: ${FULL_IMAGE}" || echo "Warning: push failed (non-fatal)"
          fi
          echo "MANYLINUX_IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV

      - name: Start build container
        run: |
          docker run -dt --network=host --user root \
            -v "${GITHUB_WORKSPACE}/flydsl:/flydsl" \
            --ipc=host --shm-size 16g \
            -w /flydsl \
            --name flydsl_build \
            "${MANYLINUX_IMAGE}"

      - name: Install build dependencies
        run: |
          # Create pythonX.Y symlinks so build_wheels.sh can find them.
          # Skip free-threaded builds (cpXYZt) — they would overwrite the normal symlink.
          docker exec flydsl_build bash -c '
            for d in /opt/python/cp*; do
              case "${d}" in *t) continue ;; esac
              py="${d}/bin/python"
              [ -x "${py}" ] || continue
              ver=$("${py}" -c "import sys; print(f\"{sys.version_info.major}.{sys.version_info.minor}\")")
              ln -sf "${py}" "/usr/local/bin/python${ver}"
              echo "  python${ver} -> ${py}"
            done
          '
          docker exec flydsl_build bash -c "pip install -q numpy nanobind pybind11 auditwheel"
          docker exec flydsl_build bash -c "git config --global --add safe.directory '*'"

      - name: Restore cached MLIR install tarball
        id: mlir-cache
        uses: actions/cache@v4
        with:
          path: mlir_install.tgz
          key: mlir-install-manylinux228-${{ hashFiles('flydsl/thirdparty/llvm-hash.txt', 'flydsl/scripts/build_llvm.sh', 'flydsl/CMakeLists.txt', 'flydsl/.github/workflows/build-whl.yaml') }}

      - name: Use cached MLIR install tarball
        if: steps.mlir-cache.outputs.cache-hit == 'true'
        run: |
          docker cp mlir_install.tgz flydsl_build:/tmp/mlir_install.tgz
          docker exec flydsl_build bash -c "mkdir -p /llvm-project && tar -xzf /tmp/mlir_install.tgz -C /llvm-project"
          docker exec flydsl_build bash -c "ls -la /llvm-project/mlir_install/lib/cmake/mlir"

      - name: Build LLVM
        if: steps.mlir-cache.outputs.cache-hit != 'true'
        run: |
          docker exec flydsl_build bash -c "cd /flydsl && bash scripts/build_llvm.sh"
          docker cp flydsl_build:/llvm-project/mlir_install.tgz ./mlir_install.tgz || true

      - name: Build wheels
        env:
          PACKAGE_VERSION_OVERRIDE: ${{ inputs.package_version_override }}
        run: |
          docker exec \
            -e MLIR_PATH=/llvm-project/mlir_install \
            -e EXPECTED_GLIBC=2.28 \
            -e FLYDSL_RELEASE_TYPE=${{ inputs.release_type }} \
            -e "FLYDSL_PACKAGE_VERSION_OVERRIDE=${PACKAGE_VERSION_OVERRIDE}" \
            flydsl_build bash -c "cd /flydsl && bash scripts/build_wheels.sh"
          docker cp flydsl_build:/flydsl/dist ./dist
          # fly-opt is a Python-independent C++ binary; pick whichever per-version
          # build dir produced it (path is build-fly/build_py<MAJ><MIN>/bin/fly-opt).
          FLY_OPT_SRC=$(docker exec flydsl_build bash -c 'ls -1 /flydsl/build-fly/build_py*/bin/fly-opt 2>/dev/null | head -n1')
          if [ -z "${FLY_OPT_SRC}" ]; then
            echo "Error: fly-opt not found in any build-fly/build_py*/bin directory" >&2
            exit 1
          fi
          echo "Copying fly-opt from ${FLY_OPT_SRC}"
          docker cp "flydsl_build:${FLY_OPT_SRC}" ./dist/fly-opt

      - name: Collect wheel names
        id: collect-wheels
        run: |
          WHEELS=$(ls dist/*.whl | xargs -n1 basename | tr '\n' ' ')
          echo "wheel_names=${WHEELS}" >> $GITHUB_OUTPUT
          echo "Built wheels: ${WHEELS}"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flydsl-wheels
          path: |
            dist/*.whl
            dist/fly-opt
          retention-days: 3

      - name: Build summary
        if: always()
        env:
          SUMMARY_DOCKER_IMAGE: ${{ env.MANYLINUX_IMAGE }}
          SUMMARY_MLIR_CACHE: ${{ steps.mlir-cache.outputs.cache-hit == 'true' && 'Hit' || 'Miss (rebuilt)' }}
          SUMMARY_RELEASE_TYPE: ${{ inputs.release_type }}
          SUMMARY_WHEEL_DIR: dist
        run: |
          SUMMARY_LLVM_COMMIT="$(cat flydsl/thirdparty/llvm-hash.txt | tr -d '[:space:]')"
          export SUMMARY_LLVM_COMMIT
          python3 flydsl/scripts/generate_summary.py build

      - name: Configure AWS credentials
        if: ${{ github.repository_owner == 'ROCm' && inputs.upload_s3_staging }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::661452401056:role/framework-flydsl-${{ inputs.release_type }}

      - name: Install AWS CLI
        if: ${{ github.repository_owner == 'ROCm' && inputs.upload_s3_staging }}
        run: bash ./flydsl/scripts/install_awscli.sh

      - name: Upload wheels to S3 staging
        if: ${{ github.repository_owner == 'ROCm' && inputs.upload_s3_staging }}
        run: |
          aws s3 cp dist/ s3://framework-whls-${{ inputs.release_type }}/whl-staging/gfx942-gfx950/ \
            --recursive --exclude "*" --include "*.whl"

      - name: Clean up
        if: always()
        run: |
          docker stop flydsl_build || true
          docker rm flydsl_build || true
