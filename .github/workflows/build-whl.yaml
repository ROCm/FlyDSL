name: Build Wheels

on:
  workflow_call:
    inputs:
      release_type:
        description: 'Release type determines target S3 bucket (devreleases, nightlies, release)'
        type: string
        required: true
      docker_image:
        description: 'Docker base image for build'
        type: string
        required: true
      python_versions:
        description: 'Space-separated Python versions to build wheels for (e.g., "3.12 3.13")'
        type: string
        required: false
        default: '3.10 3.12'
    outputs:
      wheel_names:
        description: 'Space-separated list of built wheel filenames'
        value: ${{ jobs.build.outputs.wheel_names }}

jobs:
  build:
    runs-on: linux-flydsl-mi325-1
    outputs:
      wheel_names: ${{ steps.collect-wheels.outputs.wheel_names }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: flydsl

      - name: Start build container
        run: |
          docker run -dt --network=host --user root \
            -v "${GITHUB_WORKSPACE}/flydsl:/flydsl" \
            --ipc=host --shm-size 16g \
            -w /flydsl \
            --name flydsl_build \
            ${{ inputs.docker_image }}

      - name: Install build dependencies
        run: |
          docker exec flydsl_build bash -c "apt-get update && apt-get install -y cmake build-essential patchelf software-properties-common"
          docker exec flydsl_build bash -c "add-apt-repository -y ppa:deadsnakes/ppa && apt-get update"
          # Install Python versions that are not already in the Docker image
          for ver in ${{ inputs.python_versions }}; do
            docker exec flydsl_build bash -c "command -v python${ver} || apt-get install -y python${ver} python${ver}-dev python${ver}-venv || true"
          done
          docker exec flydsl_build bash -c "python3 -m pip install -U pip setuptools wheel"
          docker exec flydsl_build bash -c "python3 -m pip install ninja>=1.11.1"
          docker exec flydsl_build bash -c "git config --global --add safe.directory '*'"

      - name: Restore cached MLIR install tarball
        id: mlir-cache
        uses: actions/cache@v4
        with:
          path: mlir_install.tgz
          key: mlir-install-${{ hashFiles('flydsl/thirdparty/llvm-hash.txt', 'flydsl/scripts/build_llvm.sh', 'flydsl/CMakeLists.txt', 'flydsl/.github/workflows/build-whl.yaml') }}

      - name: Use cached MLIR install tarball
        if: steps.mlir-cache.outputs.cache-hit == 'true'
        run: |
          docker cp mlir_install.tgz flydsl_build:/tmp/mlir_install.tgz
          docker exec flydsl_build bash -c "mkdir -p /llvm-project && tar -xzf /tmp/mlir_install.tgz -C /llvm-project"
          docker exec flydsl_build bash -c "ls -la /llvm-project/mlir_install/lib/cmake/mlir"

      - name: Build LLVM
        if: steps.mlir-cache.outputs.cache-hit != 'true'
        run: |
          docker exec flydsl_build bash -c "cd /flydsl && bash scripts/build_llvm.sh"
          docker cp flydsl_build:/llvm-project/mlir_install.tgz ./mlir_install.tgz || true

      - name: Build wheels
        run: |
          docker exec flydsl_build bash -c "export MLIR_PATH=/llvm-project/mlir_install && export ALLOW_ANY_GLIBC=1 && export FLYDSL_RELEASE_TYPE=${{ inputs.release_type }} && export PYTHON_VERSIONS='${{ inputs.python_versions }}' && cd /flydsl && bash scripts/build_wheels.sh"
          docker cp flydsl_build:/flydsl/dist ./dist
          # Copy fly-opt from the first built Python version's build dir
          FIRST_VER=$(echo "${{ inputs.python_versions }}" | awk '{print $1}' | tr -d '.')
          docker cp flydsl_build:/flydsl/build-fly/build_py${FIRST_VER}/bin/fly-opt ./dist/fly-opt

      - name: Collect wheel names
        id: collect-wheels
        run: |
          WHEELS=$(ls dist/*.whl | xargs -n1 basename | tr '\n' ' ')
          echo "wheel_names=${WHEELS}" >> $GITHUB_OUTPUT
          echo "Built wheels: ${WHEELS}"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flydsl-wheels
          path: |
            dist/*.whl
            dist/fly-opt
          retention-days: 3

      - name: Build summary
        if: always()
        env:
          SUMMARY_DOCKER_IMAGE: ${{ inputs.docker_image }}
          SUMMARY_LLVM_COMMIT: $(cat flydsl/thirdparty/llvm-hash.txt | tr -d '[:space:]')
          SUMMARY_MLIR_CACHE: ${{ steps.mlir-cache.outputs.cache-hit == 'true' && 'Hit' || 'Miss (rebuilt)' }}
          SUMMARY_RELEASE_TYPE: ${{ inputs.release_type }}
          SUMMARY_WHEEL_DIR: dist
        run: python3 flydsl/scripts/generate_summary.py build

      - name: Configure AWS credentials
        if: ${{ github.repository_owner == 'ROCm' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::661452401056:role/framework-flydsl-${{ inputs.release_type }}

      - name: Install AWS CLI
        if: ${{ github.repository_owner == 'ROCm' }}
        run: bash ./flydsl/scripts/install_awscli.sh

      - name: Upload wheels to S3 staging
        if: ${{ github.repository_owner == 'ROCm' }}
        run: |
          aws s3 cp dist/ s3://framework-whls-${{ inputs.release_type }}/whl-staging/gfx942-gfx950/ \
            --recursive --exclude "*" --include "*.whl"

      - name: Clean up
        if: always()
        run: |
          docker stop flydsl_build || true
          docker rm flydsl_build || true
