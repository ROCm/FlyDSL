name: Rerun CI (comment or label)

# Lets an authorized user re-run FlyDSL CI on a pull request, instead of pushing
# empty commits. Two entry points:
#
#   1. Slash command (primary) — comment on the PR:
#        /rerun-ci        re-run the latest "Fly DSL test" run for the PR head SHA
#        /rerun-checks    re-run the latest "Checks" (pre-checks) run
#        /rerun-all       re-run both of the above
#        append "failed"  (e.g. "/rerun-ci failed") to re-run only FAILED jobs
#
#   2. Label — apply the `rerun-ci` label to the PR. This re-runs "Fly DSL test".
#      NOTE: GitHub does NOT re-fire `pull_request: labeled` for a label that is
#      already present, so to use the label a second time you must remove it and
#      re-add it. The slash command has no such limitation and is preferred for
#      repeated reruns.
#
# Why re-run the existing run instead of `workflow_dispatch` with a ref:
#   - The workflow_dispatch REST API only accepts a branch or tag name for `ref`,
#     NOT an arbitrary commit SHA — and a fork PR's head branch does not exist in
#     this (base) repository. Re-running the existing run (`gh run rerun`)
#     re-executes against the exact PR head commit and works for fork PRs too.
#
# Security model:
#   - issue_comment / the label workflow always run this file from the DEFAULT
#     branch of the BASE repo, so a fork PR cannot alter what this does.
#   - We only ever *re-run an existing run* for the PR head SHA; PR code is never
#     checked out or executed in this privileged job.
#   - Only the PR author or users with write/maintain/admin may trigger it.

on:
  issue_comment:
    types: [created, edited]
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  actions: write          # required to re-run the target workflow runs
  pull-requests: read
  issues: write           # required to react/comment on the PR

concurrency:
  # Serialize reruns per PR; never cancel a rerun already in flight.
  group: rerun-ci-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Entry point A: slash command in a PR comment.
  # ---------------------------------------------------------------------------
  rerun-from-comment:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (contains(github.event.comment.body, '/rerun-ci') ||
       contains(github.event.comment.body, '/rerun-checks') ||
       contains(github.event.comment.body, '/rerun-all'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve command, permission, and PR head SHA
        id: ctx
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const body = context.payload.comment.body || "";
            const commenter = context.payload.comment.user.login;

            // which command? (most specific first)
            let cmd = "rerun-ci";
            if (body.includes("/rerun-all")) cmd = "rerun-all";
            else if (body.includes("/rerun-checks")) cmd = "rerun-checks";
            else if (body.includes("/rerun-ci")) cmd = "rerun-ci";
            core.setOutput("cmd", cmd);

            // "/rerun-ci failed" -> only re-run failed jobs of that run
            core.setOutput("failed_only", String(/\/rerun-\S+\s+failed\b/.test(body)));

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            core.setOutput("head_sha", pr.data.head.sha);

            // permission gate: write/maintain/admin OR the PR author
            let level = "none";
            try {
              const perm = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: commenter,
              });
              level = perm.data.permission || "none";
            } catch (e) {
              core.warning(`permission lookup failed for ${commenter}: ${e.message}`);
            }
            const allowed = ["admin", "maintain", "write"].includes(level)
                            || commenter === pr.data.user.login;
            core.setOutput("allowed", String(allowed));

            try {
              await github.rest.reactions.createForIssueComment({
                owner, repo, comment_id: context.payload.comment.id,
                content: allowed ? "rocket" : "confused",
              });
            } catch (e) { core.warning(`could not add reaction: ${e.message}`); }

            if (!allowed) {
              core.setFailed(
                `@${commenter} (permission: ${level}) may not rerun CI. ` +
                `Only the PR author or users with write access can.`
              );
            }

      - name: Re-run target workflow run(s)
        if: steps.ctx.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.ctx.outputs.head_sha }}
          CMD: ${{ steps.ctx.outputs.cmd }}
          FAILED_ONLY: ${{ steps.ctx.outputs.failed_only }}
        run: ./.github/scripts/rerun_ci.sh

      - name: Acknowledge in the PR thread
        if: steps.ctx.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const cmd = "${{ steps.ctx.outputs.cmd }}";
            const failedOnly = "${{ steps.ctx.outputs.failed_only }}" === "true";
            const sha = "${{ steps.ctx.outputs.head_sha }}".slice(0, 8);
            const what = cmd === "rerun-all" ? "Fly DSL test + Checks"
                       : (cmd === "rerun-checks" ? "Checks" : "Fly DSL test");
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔁 Re-running ${failedOnly ? "failed jobs of " : ""}**${what}** ` +
                    `for \`${sha}\` (requested by @${context.payload.comment.user.login}).`,
            });

  # ---------------------------------------------------------------------------
  # Entry point B: the `rerun-ci` label is applied to the PR.
  # Uses pull_request_target so it has the base-repo token even for fork PRs;
  # it still only RE-RUNS an existing run and never checks out PR code.
  # ---------------------------------------------------------------------------
  rerun-from-label:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.label.name == 'rerun-ci'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve permission and PR head SHA
        id: ctx
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            core.setOutput("head_sha", pr.head.sha);

            // Who applied the label? (github.event.sender)
            const actor = context.payload.sender.login;
            let level = "none";
            try {
              const perm = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: actor,
              });
              level = perm.data.permission || "none";
            } catch (e) {
              core.warning(`permission lookup failed for ${actor}: ${e.message}`);
            }
            const allowed = ["admin", "maintain", "write"].includes(level)
                            || actor === pr.user.login;
            core.setOutput("allowed", String(allowed));
            if (!allowed) {
              core.setFailed(`@${actor} (permission: ${level}) may not rerun CI via label.`);
            }

      - name: Re-run "Fly DSL test"
        if: steps.ctx.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.ctx.outputs.head_sha }}
          CMD: rerun-ci
          FAILED_ONLY: "false"
        run: ./.github/scripts/rerun_ci.sh

      - name: Acknowledge in the PR thread
        if: steps.ctx.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = "${{ steps.ctx.outputs.head_sha }}".slice(0, 8);
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🔁 Re-running **Fly DSL test** for \`${sha}\` ` +
                    `(\`rerun-ci\` label applied by @${context.payload.sender.login}). ` +
                    `Tip: remove + re-add the label to trigger again, or comment \`/rerun-ci\`.`,
            });
