name: FlyDSL CI

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type determines target S3 bucket'
        type: choice
        options:
          - devreleases
          - nightlies
          - release
        default: "devreleases"
      skip_tests:
        description: 'Skip test job for faster iteration'
        type: boolean
        default: false
      skip_promote:
        description: 'Skip promote job (build + test only)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build-whl.yaml
    with:
      release_type: ${{ inputs.release_type || 'nightlies' }}
    permissions:
      id-token: write
      contents: read

  test:
    needs: build
    if: ${{ !(inputs.skip_tests || false) }}
    uses: ./.github/workflows/test-whl.yaml
    permissions:
      contents: read

  promote:
    needs: [build, test]
    if: >-
      ${{ github.repository_owner == 'ROCm'
          && !(inputs.skip_promote || false) }}
    uses: ./.github/workflows/promote.yaml
    with:
      release_type: ${{ inputs.release_type || 'nightlies' }}
      wheel_names: ${{ needs.build.outputs.wheel_names }}
    permissions:
      id-token: write
      contents: read
