name: Publish FlyDSL to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test job for faster iteration'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate_tag:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_VERSION="$(awk -F'"' '/^__version__ = / {print $2; exit}' python/flydsl/__init__.py)"

          if [ -z "${SOURCE_VERSION}" ]; then
            echo "Failed to find __version__ in python/flydsl/__init__.py" >&2
            exit 1
          fi

          if [ "${TAG_VERSION}" = "${SOURCE_VERSION}" ]; then
            PACKAGE_VERSION="${SOURCE_VERSION}"
          else
            DEV_NUMBER="$(git rev-list --count HEAD)"
            if [ -z "${DEV_NUMBER}" ]; then
              echo "Failed to derive dev version from git rev-list" >&2
              exit 1
            fi
            EXPECTED_DEV_VERSION="${SOURCE_VERSION}.dev${DEV_NUMBER}"
            if [ "${TAG_VERSION}" != "${EXPECTED_DEV_VERSION}" ]; then
              echo "Tag ${GITHUB_REF_NAME} must match source version ${SOURCE_VERSION} or ${EXPECTED_DEV_VERSION}" >&2
              exit 1
            fi
            PACKAGE_VERSION="${EXPECTED_DEV_VERSION}"
          fi

          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"

  build:
    needs: validate_tag
    if: ${{ always() && (needs.validate_tag.result == 'success' || needs.validate_tag.result == 'skipped') }}
    uses: ./.github/workflows/build-whl.yaml
    with:
      release_type: ${{ github.event_name == 'push' && 'release' || 'devreleases' }}
      upload_s3_staging: false
      package_version_override: ${{ needs.validate_tag.outputs.package_version }}
    permissions:
      id-token: write
      contents: read

  test:
    needs: [validate_tag, build]
    if: ${{ always() && needs.build.result == 'success' && !(inputs.skip_tests || false) }}
    uses: ./.github/workflows/test-whl.yaml
    with:
      docker_image: rocm/pytorch:rocm7.2_ubuntu22.04_py3.10_pytorch_release_2.8.0
    permissions:
      contents: read

  publish:
    needs: [validate_tag, build, test]
    if: ${{ always() && needs.build.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: flydsl-wheels
          path: dist

      - name: Prepare PyPI distributions
        run: |
          mkdir -p pypi-dist
          cp dist/*.whl pypi-dist/
          ls -lh pypi-dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate distributions
        run: |
          python -m pip install -U twine
          python -m twine check pypi-dist/*.whl

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist/
          skip-existing: true

      - name: Publish summary
        run: |
          {
            echo "## PyPI Publish Summary"
            echo
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "Published tag: \`${GITHUB_REF_NAME}\`"
              echo "Package version: \`${{ needs.validate_tag.outputs.package_version }}\`"
            else
              echo "Manual dev release from branch: \`${GITHUB_REF_NAME}\`"
              WHEEL_NAME=$(ls -1 pypi-dist/*.whl | head -1 | xargs basename)
              DEV_VERSION=$(echo "${WHEEL_NAME}" | sed 's/^flydsl-//;s/-cp.*//')
              echo "Package version: \`${DEV_VERSION}\`"
            fi
            echo
            echo "Published package: \`flydsl\`"
            echo
            echo "### Distributions"
            echo '```'
            ls -1 pypi-dist/*.whl
            echo '```'
            echo
            echo "### Install"
            echo '```bash'
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "pip install flydsl==${{ needs.validate_tag.outputs.package_version }}"
            else
              echo "pip install --pre flydsl"
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
