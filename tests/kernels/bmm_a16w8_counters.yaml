# rocprofv3 v1.1.0 counter config for bmm_a16w8_gfx1250 profiling.
#
# Usage (single config):
#   cd ~/flydsl
#   rocprofv3 -i tests/kernels/bmm_a16w8_counters.yaml \
#       -d /tmp/bmm_profile/dec_e8m0 \
#       -f csv \
#       -- python tests/kernels/profile_bmm_a16w8.py dec_e8m0
#
# Usage (all configs via shell script):
#   bash tests/kernels/run_bmm_a16w8_profile.sh
#
# kernel_iteration_range: capture dispatches 10..14 per config run.
#   N_WARMUP=10 (indices 0..9) warms L2 but is NOT profiled.
#   N_PROFILE=5 (indices 10..14) is profiled. Must match profile_bmm_a16w8.py.
#
# Counter grouping: rocprofv3 automatically replays the kernel multiple times
# when the requested counters exceed one hardware pass (~16 counters/pass).
# We split into 2 passes manually for clarity and to avoid auto-split surprises.
#
# Analysis cheat-sheet (using these counters):
#   WGP_util = SQG_BUSY_CYCLES / GRBM_GUI_ACTIVE
#   issue_stall_rate = SQ_INST_ISSUE_ALL_STALL / GRBM_GUI_ACTIVE
#   VMEM_stall_frac = SQ_INST_ISSUE_TEX_STALL / SQ_INST_ISSUE_ALL_STALL
#   LDS_stall_frac  = SQ_INST_ISSUE_LDS_STALL / SQ_INST_ISSUE_ALL_STALL
#   XDL_util = SQ_VALU_WMMA_FLOP_BF16 / (4200e12 FLOPS/s × GUI_ACTIVE/GPU_clk)
#   HBM_rd_BW = GC_EA_SE_SARB_DRAM_RD_SIZE_REQ × 8SE × 32B / kernel_time
#   HBM_credit_stall = GL2C_EA_REQ_VC4_STALL / GL2C_CYCLE  (>0.4 = D-bound)
#   GL2_sat = GL2C_LATENCY_FIFO_FULL / GL2C_CYCLE           (>0.3 = C/D-bound)
#   GL1_sat = GL1XC_STALL_BUFFER_FULL / GL1C_CYCLE          (>0.3 = GL1-bound)
#
# XDL counter bug (DEGFXMI400-13195):
#   SQ_INST_CYCLES_VALU_WMMA is BROKEN with DISABLE_VALU_ARB_STALL=1.
#   Use SQ_VALU_WMMA_FLOP_BF16 + roofline instead.

jobs:

  # Pass 1: Compute/wave/LDS counters (15 counters)
  - pmc_groups:
      - [GRBM_GUI_ACTIVE, SQG_BUSY_CYCLES, SQ_LEVEL_WAVE,
         SQ_INST_ISSUE_ALL_STALL, SQ_INST_ISSUE_TEX_STALL,
         SQ_INST_ISSUE_LDS_STALL, SQ_INST_ISSUE_VALU_STALL,
         SQ_WAIT_ANY, SQ_WAIT_CNT_LOAD, SQ_WAIT_CNT_DS,
         SQ_WAIT_BARRIER, SQ_WAIT_DEPCTR,
         SQ_VALU_WMMA_FLOP_BF16,
         TX_VCA_LDS_LOAD_BANDWIDTH_BYTES, TX_VCA_LDS_STORE_BANDWIDTH_BYTES]
      # Pass 2: Cache/HBM counters (14 counters)
      - [TX_VMW_GL1_VMW_BACK_PRESSURE,
         GL1XC_STALL_BUFFER_FULL, GL1C_BUSY, GL1C_CYCLE,
         GLARBC_STALL_GL2_GL1, GLARBC_BUSY,
         GL2C_BUSY, GL2C_CYCLE, GL2C_LATENCY_FIFO_FULL, GL2C_TAG_STALL,
         GL2C_EA_REQ_VC4_STALL, GL2C_EA_REQ_VC6_STALL,
         GC_EA_SE_SARB_DRAM_RD_SIZE_REQ, GC_EA_SE_SARB_DRAM_WR_SIZE_REQ,
         GC_EA_SE_STALL_DRAM]
    kernel_include_regex: "kernel_bmm_a16w8_gfx1250"
    kernel_iteration_range: "10-14"
